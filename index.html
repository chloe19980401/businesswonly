<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acquire OS｜全球B2B获客系统</title>
<meta name="description" content="门锁出海工厂全渠道客户情报系统演示版">
<style>


:root {
  --ink: #17202f;
  --muted: #697386;
  --soft: #f5f7fa;
  --line: #e2e7ef;
  --blue: #1768e5;
  --blue-dark: #0f4fae;
  --blue-soft: #eaf2ff;
  --green: #168253;
  --green-soft: #e8f6ef;
  --amber: #a86100;
  --amber-soft: #fff3dc;
  --red: #c23934;
  --red-soft: #fff0ef;
  --white: #ffffff;
  --shadow: 0 18px 50px rgba(22, 35, 59, 0.14);
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #f3f5f8; color: var(--ink); }
body { font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
button, input, select { font: inherit; }
button { cursor: pointer; }

.app-shell { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); }
.sidebar { background: #101a2d; color: #fff; padding: 24px 16px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.brand-block { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid rgba(255,255,255,.1); }
.brand-mark { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(145deg, #3f8cff, #1768e5); display: grid; place-items: center; font-weight: 700; box-shadow: 0 8px 20px rgba(23,104,229,.35); }
.brand-block strong, .brand-block span { display: block; }
.brand-block strong { font-size: 16px; letter-spacing: .2px; }
.brand-block span { color: #9eabc0; font-size: 11px; margin-top: 3px; }
.primary-nav { display: grid; gap: 5px; margin-top: 22px; }
.nav-item { border: 0; background: transparent; color: #aeb9ca; padding: 11px 12px; border-radius: 9px; text-align: left; display: flex; gap: 11px; align-items: center; font-size: 13px; }
.nav-item span { width: 18px; text-align: center; }
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
.nav-item.active { box-shadow: inset 3px 0 #4c94ff; }
.sidebar-foot { margin-top: auto; border-top: 1px solid rgba(255,255,255,.1); padding-top: 16px; }
.sync-status { color: #aeb9ca; font-size: 11px; display: flex; gap: 7px; align-items: center; padding: 0 7px 14px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #3cd68b; box-shadow: 0 0 0 4px rgba(60,214,139,.12); }
.user-row { display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.06); padding: 10px; border-radius: 10px; }
.avatar { width: 30px; height: 30px; background: #34425a; border-radius: 50%; display: grid; place-items: center; font-size: 12px; }
.user-row strong, .user-row small { display: block; }
.user-row strong { font-size: 12px; }
.user-row small { color: #99a6ba; margin-top: 2px; font-size: 10px; }

.workspace { min-width: 0; padding: 28px 30px 42px; }
.topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 22px; }
.eyebrow { color: var(--blue); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
.topbar h1 { margin: 5px 0 4px; font-size: 28px; line-height: 1.2; letter-spacing: -.6px; }
.topbar p { margin: 0; color: var(--muted); font-size: 13px; }
.top-actions, .drawer-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.primary-btn, .secondary-btn, .filter-btn, .close-btn { border-radius: 8px; padding: 9px 13px; border: 1px solid var(--line); background: var(--white); color: var(--ink); font-size: 12px; font-weight: 600; }
.primary-btn { background: var(--blue); color: #fff; border-color: var(--blue); }
.primary-btn:hover { background: var(--blue-dark); }
.secondary-btn:hover, .filter-btn:hover { background: var(--soft); }
.demo-badge { background: var(--amber-soft); color: var(--amber); padding: 6px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin: 22px 0 14px; }
.metrics article { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px; }
.metrics span, .metrics strong, .metrics small { display: block; }
.metrics span { color: var(--muted); font-size: 11px; }
.metrics strong { font-size: 24px; margin: 7px 0 4px; letter-spacing: -.5px; }
.metrics small { color: var(--muted); font-size: 10px; }

.channel-panel, .content-panel { background: #fff; border: 1px solid var(--line); border-radius: 12px; }
.channel-panel { margin-bottom: 12px; padding: 8px; }
.channel-tabs { display: grid; grid-template-columns: repeat(9, minmax(0,1fr)); gap: 5px; }
.channel-tab { position: relative; min-width: 0; border: 1px solid transparent; background: transparent; border-radius: 9px; padding: 9px 8px; text-align: left; display: grid; grid-template-columns: 27px minmax(0,1fr); gap: 7px; align-items: center; color: var(--ink); }
.channel-tab:hover { background: var(--soft); }
.channel-tab.selected { background: var(--blue-soft); border-color: #c9dcff; color: #114c9e; }
.channel-symbol { width: 27px; height: 27px; border-radius: 8px; background: #eef1f6; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
.channel-tab.selected .channel-symbol { background: var(--blue); color: #fff; }
.channel-tab strong, .channel-tab small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-tab strong { font-size: 11px; }
.channel-tab small { color: var(--muted); margin-top: 2px; font-size: 9px; }
.channel-tab em { position: absolute; top: 5px; right: 6px; font-style: normal; font-size: 9px; color: var(--muted); }

.filterbar { padding: 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-box { min-width: 240px; flex: 1 1 300px; position: relative; }
.search-box span { position: absolute; left: 11px; top: 8px; color: var(--muted); }
.search-box input, .filterbar select { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 9px 10px; color: var(--ink); font-size: 11px; outline: none; }
.search-box input { padding-left: 31px; }
.search-box input:focus, .filterbar select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.filterbar select { width: 118px; }
.result-count { margin-left: auto; color: var(--muted); font-size: 10px; }
.result-count strong { color: var(--ink); }

.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1260px; table-layout: fixed; }
th { position: sticky; top: 0; z-index: 1; background: #f8f9fb; color: var(--muted); font-size: 10px; font-weight: 700; padding: 10px 11px; text-align: left; border-bottom: 1px solid var(--line); }
th:nth-child(1) { width: 230px; } th:nth-child(2) { width: 145px; } th:nth-child(3) { width: 240px; } th:nth-child(4) { width: 210px; } th:nth-child(5) { width: 190px; } th:nth-child(6) { width: 78px; } th:nth-child(7) { width: 125px; } th:nth-child(8) { width: 125px; }
td { padding: 12px 11px; border-bottom: 1px solid #edf0f4; vertical-align: top; font-size: 11px; color: #263247; }
tbody tr { transition: background .15s ease; cursor: pointer; }
tbody tr:hover { background: #f7faff; }
td strong, td small { display: block; }
td strong { font-weight: 650; line-height: 1.4; }
td small { color: var(--muted); font-size: 9.5px; line-height: 1.4; margin-top: 4px; }
.account-main { display: flex; gap: 9px; min-width: 0; }
.company-logo { width: 34px; height: 34px; border-radius: 9px; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-size: 10px; font-weight: 800; flex: 0 0 auto; }
.account-main > div { min-width: 0; }
.account-main > div > strong { font-size: 12px; color: #162033; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-line { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tag-line span, .channel-pill, .grade { border-radius: 999px; padding: 3px 6px; font-size: 8.5px; font-weight: 700; display: inline-block; }
.tag-line span { background: #f0f2f6; color: #586579; }
.channel-pill { background: var(--blue-soft); color: #245ca7; margin-bottom: 5px; }
.signal-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.score { width: 39px; height: 39px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 13px; }
.score-strong { color: var(--green); background: var(--green-soft); }
.score-medium { color: var(--amber); background: var(--amber-soft); }
.score-light { color: var(--muted); background: #eef1f5; }
.grade { margin-bottom: 6px; }
.grade-A { color: var(--green); background: var(--green-soft); }
.grade-B { color: var(--amber); background: var(--amber-soft); }
.grade-C { color: var(--muted); background: #eef1f5; }
.empty-state { padding: 60px; display: grid; place-items: center; gap: 8px; color: var(--muted); }
.empty-state strong { color: var(--ink); }

.drawer-layer { position: fixed; inset: 0; background: rgba(12, 19, 31, .48); z-index: 20; display: flex; justify-content: flex-end; }
.detail-drawer { width: min(760px, 94vw); height: 100vh; background: #fff; overflow-y: auto; box-shadow: var(--shadow); animation: slideIn .22s ease-out; }
@keyframes slideIn { from { transform: translateX(30px); opacity: .7; } to { transform: translateX(0); opacity: 1; } }
.drawer-head { padding: 22px 24px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
.detail-identity { display: flex; gap: 12px; align-items: flex-start; }
.detail-logo { width: 46px; height: 46px; border-radius: 12px; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-size: 12px; font-weight: 800; }
.detail-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-title-row h2 { margin: 0; font-size: 20px; }
.detail-identity p { margin: 4px 0 6px; color: var(--muted); font-size: 11px; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.detail-meta span { background: var(--soft); color: #536075; border-radius: 6px; padding: 4px 6px; font-size: 9px; }
.close-btn { border: 0; background: #f1f3f6; width: 32px; height: 32px; padding: 0; font-size: 20px; line-height: 1; color: #536075; }
.decision-card { margin: 18px 24px 12px; padding: 15px; border-radius: 11px; background: linear-gradient(110deg, #f0f6ff, #f8fbff); border: 1px solid #d7e6ff; display: grid; grid-template-columns: 76px minmax(0,1fr); gap: 14px; }
.decision-card > div:first-child { border-right: 1px solid #ccdef8; }
.decision-card span, .decision-card small { color: var(--muted); display: block; font-size: 9px; }
.decision-card > div > strong { display: block; color: var(--blue-dark); font-size: 28px; margin-top: 4px; }
.decision-copy strong { display: block; font-size: 12px; line-height: 1.5; margin: 5px 0; color: #1d3559; }
.drawer-actions { padding: 0 24px 18px; border-bottom: 1px solid var(--line); }
.detail-section { padding: 19px 24px; border-bottom: 1px solid var(--line); }
.last-section { padding-bottom: 38px; }
.section-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 13px; }
.section-title h3 { margin: 0; font-size: 14px; }
.section-title span { color: var(--muted); font-size: 9px; }
.info-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 9px 14px; }
.info-item { background: #f8f9fb; border-radius: 8px; padding: 10px 11px; min-width: 0; }
.info-item span, .info-item strong { display: block; }
.info-item span { color: var(--muted); font-size: 9px; margin-bottom: 4px; }
.info-item strong { font-size: 11px; line-height: 1.45; overflow-wrap: anywhere; }
.channel-info { grid-template-columns: repeat(3, minmax(0,1fr)); }
.evidence-box, .compliance-note { margin-top: 10px; border-left: 3px solid var(--blue); background: var(--blue-soft); padding: 10px 12px; }
.evidence-box span { color: #37689e; font-size: 9px; font-weight: 700; }
.evidence-box p { margin: 4px 0 0; font-size: 10px; line-height: 1.5; }
.contact-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: 38px 1fr 1.4fr; gap: 11px; align-items: center; }
.contact-avatar { width: 38px; height: 38px; border-radius: 50%; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-weight: 800; }
.contact-copy strong, .contact-copy span, .contact-copy small, .contact-detail span { display: block; }
.contact-copy strong { font-size: 12px; }
.contact-copy span { color: #40506a; font-size: 10px; margin-top: 3px; }
.contact-copy small, .contact-detail span { color: var(--muted); font-size: 9px; margin-top: 3px; overflow-wrap: anywhere; }
.next-action { background: var(--green-soft); border-radius: 9px; padding: 12px; }
.next-action span, .next-action strong, .next-action small { display: block; }
.next-action span { color: var(--green); font-size: 9px; font-weight: 700; }
.next-action strong { font-size: 11px; margin: 5px 0; }
.next-action small { color: #527264; font-size: 9px; }
.activity-row { margin-top: 9px; display: flex; justify-content: space-between; gap: 12px; font-size: 10px; }
.activity-row span { color: var(--muted); }
.compliance-note { border-left-color: var(--amber); background: var(--amber-soft); display: flex; gap: 8px; font-size: 10px; }
.compliance-note strong { color: var(--amber); white-space: nowrap; }

@media (max-width: 1280px) {
  .channel-tabs { grid-template-columns: repeat(5, minmax(0,1fr)); }
}
@media (max-width: 900px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; padding: 14px; }
  .brand-block { padding-bottom: 12px; }
  .primary-nav { display: flex; overflow-x: auto; margin-top: 12px; }
  .nav-item { white-space: nowrap; }
  .sidebar-foot { display: none; }
  .workspace { padding: 20px 16px 32px; }
  .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .channel-tabs { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (max-width: 620px) {
  .topbar { flex-direction: column; }
  .top-actions { width: 100%; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .metrics strong { font-size: 20px; }
  .channel-tabs { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .filterbar select { flex: 1; width: auto; }
  .result-count { width: 100%; margin-left: 0; }
  .detail-drawer { width: 100%; }
  .decision-card { grid-template-columns: 62px minmax(0,1fr); margin-left: 14px; margin-right: 14px; }
  .drawer-head, .detail-section { padding-left: 14px; padding-right: 14px; }
  .drawer-actions { padding-left: 14px; padding-right: 14px; }
  .info-grid, .channel-info { grid-template-columns: 1fr; }
  .contact-card { grid-template-columns: 38px 1fr; }
  .contact-detail { grid-column: 1 / -1; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

.static-hidden{display:none!important}.static-channel-tabs{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:5px}.detail-drawer{padding-bottom:20px}
@media(max-width:1280px){.static-channel-tabs{grid-template-columns:repeat(5,minmax(0,1fr))}}@media(max-width:900px){.static-channel-tabs{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:620px){.static-channel-tabs{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<main class="app-shell">
  <aside class="sidebar">
    <div class="brand-block"><div class="brand-mark">A</div><div><strong>Acquire OS</strong><span>全球客户情报系统</span></div></div>
    <nav class="primary-nav" aria-label="主导航">
      <button class="nav-item active"><span>⌂</span>获客中心</button><button class="nav-item"><span>◎</span>账户雷达</button><button class="nav-item"><span>◇</span>联系人</button><button class="nav-item"><span>✓</span>任务与商机</button><button class="nav-item"><span>▦</span>数据源中心</button><button class="nav-item"><span>◫</span>分析中心</button>
    </nav>
    <div class="sidebar-foot"><div class="sync-status"><span class="status-dot"></span>8个渠道正常同步</div><div class="user-row"><span class="avatar">陈</span><div><strong>陈睿</strong><small>北美品牌客户组</small></div></div></div>
  </aside>
  <section class="workspace">
    <header class="topbar"><div><div class="eyebrow">获客中心 / 全渠道客户池</div><h1>全球目标客户</h1><p>从采购证据、决策人、项目与主动意向中识别最值得跟进的账户。</p></div><div class="top-actions"><span class="demo-badge">演示数据</span><button class="secondary-btn">导入数据</button><button class="primary-btn">＋ 新建名单</button></div></header>
    <section class="metrics" aria-label="客户池概览"><article><span>已核验账户</span><strong>0</strong><small>等待接入真实数据源</small></article><article><span>已核验联系人</span><strong>0</strong><small>不展示虚拟联系人</small></article><article><span>今日新信号</span><strong>0</strong><small>等待实时抓取</small></article><article><span>待销售接手</span><strong>0</strong><small>暂无真实线索</small></article></section>
    <section class="channel-panel"><div class="static-channel-tabs" id="channel-tabs" role="tablist" aria-label="获客渠道"></div></section>
    <section class="content-panel">
      <div class="filterbar"><label class="search-box"><span>⌕</span><input id="query" aria-label="搜索客户" placeholder="搜索公司、联系人、产品或信号"></label><select id="region" aria-label="地区"><option>全部地区</option><option>北美</option><option>欧洲</option><option>中东</option><option>拉美</option><option>亚太</option><option>非洲</option></select><select id="grade" aria-label="账户等级"><option>全部等级</option><option>A</option><option>B</option><option>C</option></select><button class="filter-btn" id="clear-filters">清除筛选</button><div class="result-count" id="result-count"></div></div>
      <div class="table-wrap"><table><thead><tr><th>账户</th><th>客户类型 / 地区</th><th>渠道与关键信号</th><th>采购 / 项目价值</th><th>关键联系人</th><th>评分</th><th>阶段 / 负责人</th><th>更新时间</th></tr></thead><tbody id="customer-rows"></tbody></table><div class="empty-state static-hidden" id="empty-state"><strong>没有符合条件的客户</strong><span>尝试清除关键词或调整地区、等级筛选。</span></div></div>
    </section>
  </section>
  <div class="drawer-layer static-hidden" id="drawer-layer"><aside class="detail-drawer" role="dialog" aria-modal="true" aria-label="客户详情" id="detail-drawer"></aside></div>
</main>
<script>window.__ACQUIRE_DATA__={"channels":[{"id":"all","label":"全部渠道","short":"全","note":"统一账户池"},{"id":"customs","label":"海关 / 提单","short":"关","note":"采购关系与供应商"},{"id":"linkedin","label":"LinkedIn","short":"领","note":"决策人与任职信号"},{"id":"events","label":"展会 / 协会","short":"展","note":"参展与会面机会"},{"id":"registry","label":"官网 / 工商","short":"企","note":"企业主体与产品"},{"id":"search","label":"Google / 独立站","short":"搜","note":"主动搜索意图"},{"id":"projects","label":"工程 / 招投标","short":"项","note":"项目采购窗口"},{"id":"rfq","label":"B2B平台 / RFQ","short":"询","note":"明确采购需求"},{"id":"referral","label":"转介绍 / CRM","short":"荐","note":"高信任关系"}],"customers":[]};</script>
<script>
// Never render the illustrative records embedded in the original mockup.
window.__ACQUIRE_DATA__.customers = [];
(() => {
  const {channels, customers} = window.__ACQUIRE_DATA__;
  const channelMap = Object.fromEntries(channels.map(c => [c.id, c]));
  let activeChannel = 'all';
  const tabs = document.getElementById('channel-tabs');
  const rows = document.getElementById('customer-rows');
  const query = document.getElementById('query');
  const region = document.getElementById('region');
  const grade = document.getElementById('grade');
  const resultCount = document.getElementById('result-count');
  const emptyState = document.getElementById('empty-state');
  const layer = document.getElementById('drawer-layer');
  const drawer = document.getElementById('detail-drawer');
  const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  const count = id => id === 'all' ? customers.length : customers.filter(c => c.channel === id).length;
  const scoreTone = score => score >= 80 ? 'strong' : score >= 65 ? 'medium' : 'light';
  function renderTabs(){tabs.innerHTML=channels.map(c => '<button role="tab" aria-selected="'+(activeChannel===c.id)+'" class="channel-tab '+(activeChannel===c.id?'selected':'')+'" data-channel="'+c.id+'"><span class="channel-symbol">'+esc(c.short)+'</span><span><strong>'+esc(c.label)+'</strong><small>'+esc(c.note)+'</small></span><em>'+count(c.id)+'</em></button>').join('');tabs.querySelectorAll('[data-channel]').forEach(btn=>btn.addEventListener('click',()=>{activeChannel=btn.dataset.channel;renderTabs();renderRows();}));}
  function filtered(){const q=query.value.trim().toLowerCase();return customers.filter(c=>(activeChannel==='all'||c.channel===activeChannel)&&(region.value==='全部地区'||c.region===region.value)&&(grade.value==='全部等级'||c.grade===grade.value)&&(!q||[c.company,c.legalName,c.country,c.type,c.contactName,c.keySignal,c.tags.join(' ')].join(' ').toLowerCase().includes(q)));}
  function renderRows(){const list=filtered();resultCount.innerHTML='<strong>'+list.length+'</strong> 条客户 · '+esc(channelMap[activeChannel].note);emptyState.classList.toggle('static-hidden',list.length!==0);rows.innerHTML=list.map(c=>'<tr data-id="'+c.id+'"><td><div class="account-main"><span class="company-logo">'+esc(c.company.slice(0,2).toUpperCase())+'</span><div><strong>'+esc(c.company)+'</strong><small>'+esc(c.legalName)+'</small><div class="tag-line">'+c.tags.slice(0,2).map(t=>'<span>'+esc(t)+'</span>').join('')+'</div></div></div></td><td><strong>'+esc(c.type)+'</strong><small>'+esc(c.country)+' · '+esc(c.city)+'</small><small>'+esc(c.employees)+'人</small></td><td><span class="channel-pill">'+esc(channelMap[c.channel].label)+'</span><strong class="signal-text">'+esc(c.keySignal)+'</strong><small>'+esc(c.source)+'</small></td><td><strong>'+esc(c.estimatedValue)+'</strong><small>'+esc(c.buyingEvidence)+'</small><small>趋势：'+esc(c.purchaseTrend)+'</small></td><td><strong>'+esc(c.contactName)+'</strong><small>'+esc(c.contactTitle)+'</small><small>'+esc(c.contactVerified)+'</small></td><td><div class="score score-'+scoreTone(c.score)+'">'+c.score+'</div><small>'+esc(c.confidence)+'</small></td><td><span class="grade grade-'+c.grade+'">'+c.grade+'级</span><strong>'+esc(c.stage)+'</strong><small>'+esc(c.owner)+'</small></td><td><strong>'+esc(c.updated)+'</strong><small>'+esc(c.freshness)+'</small><small>'+esc(c.sourceId)+'</small></td></tr>').join('');rows.querySelectorAll('[data-id]').forEach(row=>row.addEventListener('click',()=>openDetail(customers.find(c=>c.id===row.dataset.id))));}
  const info=(label,value)=>'<div class="info-item"><span>'+esc(label)+'</span><strong>'+esc(value)+'</strong></div>';
  function openDetail(c){if(!c)return;drawer.innerHTML='<div class="drawer-head"><div class="detail-identity"><span class="detail-logo">'+esc(c.company.slice(0,2).toUpperCase())+'</span><div><div class="detail-title-row"><h2>'+esc(c.company)+'</h2><span class="grade grade-'+c.grade+'">'+c.grade+'级账户</span></div><p>'+esc(c.legalName)+'</p><div class="detail-meta"><span>'+esc(c.country)+' · '+esc(c.city)+'</span><span>'+esc(c.type)+'</span><span>'+esc(c.employees)+'人</span></div></div></div><button class="close-btn" id="close-drawer" aria-label="关闭详情">×</button></div><div class="decision-card"><div><span>账户评分</span><strong>'+c.score+'</strong></div><div class="decision-copy"><span>为什么现在值得跟进</span><strong>'+esc(c.keySignal)+'</strong><small>置信度 '+esc(c.confidence)+' · 数据新鲜度 '+esc(c.freshness)+'</small></div></div><div class="drawer-actions"><button class="primary-btn">创建跟进任务</button><button class="secondary-btn">加入客户名单</button><button class="secondary-btn">反馈数据问题</button></div>'+section('企业画像','标准账户 · '+c.id,[info('官方网站',c.website),info('成立年份',c.founded),info('估算营收',c.revenue),info('企业规模',c.scale+' · '+c.employees+'人'),info('主要产品',c.products.join('、')),info('认证 / 要求',c.certifications.join('、'))].join(''))+section(channelMap[c.channel].label+'专属信息',c.source,'<div class="info-grid channel-info">'+c.channelFields.map(x=>info(x[0],x[1])).join('')+'</div><div class="evidence-box"><span>渠道证据</span><p>'+esc(c.channelEvidence)+'</p></div>',true)+section('采购与供应商情报','证据可追溯',[info('购买证据',c.buyingEvidence),info('最近采购 / 节点',c.lastPurchase),info('采购趋势',c.purchaseTrend),info('预估机会价值',c.estimatedValue),info('HS / 产品编码',c.hsCodes.join('、')),info('当前供应商',c.currentSuppliers.join('；'))].join(''))+contactSection(c)+actionSection(c)+section('数据来源与合规',c.sourceId,[info('数据来源',c.source),info('来源说明',c.sourceUrl),info('最近更新',c.updated+' · '+c.freshness),info('可信度',c.confidence)].join('')+'<div class="compliance-note"><strong>合规提示</strong><span>'+esc(c.compliance)+'</span></div>');layer.classList.remove('static-hidden');document.body.style.overflow='hidden';document.getElementById('close-drawer').addEventListener('click',closeDetail);}
  function section(title,meta,body,raw=false){return '<section class="detail-section"><div class="section-title"><h3>'+esc(title)+'</h3><span>'+esc(meta)+'</span></div>'+(raw?body:'<div class="info-grid">'+body+'</div>')+'</section>';}
  function contactSection(c){return '<section class="detail-section"><div class="section-title"><h3>关键联系人</h3><span>'+esc(c.contactRole)+'</span></div><div class="contact-card"><div class="contact-avatar">'+esc(c.contactName==='待补全'?'?':c.contactName.slice(0,1))+'</div><div class="contact-copy"><strong>'+esc(c.contactName)+'</strong><span>'+esc(c.contactTitle)+'</span><small>'+esc(c.contactVerified)+'</small></div><div class="contact-detail"><span>'+esc(c.contactEmail)+'</span><span>'+esc(c.contactPhone)+'</span><span>'+esc(c.contactLinkedIn)+'</span><span>语言：'+esc(c.language)+'</span></div></div></section>';}
  function actionSection(c){return '<section class="detail-section"><div class="section-title"><h3>销售行动</h3><span>'+esc(c.stage)+'</span></div><div class="next-action"><span>建议下一步</span><strong>'+esc(c.nextAction)+'</strong><small>计划时间：'+esc(c.nextActionDate)+' · 负责人：'+esc(c.owner)+'</small></div><div class="activity-row"><span>最近活动</span><strong>'+esc(c.lastActivity)+'</strong></div></section>';}
  function closeDetail(){layer.classList.add('static-hidden');document.body.style.overflow='';}
  layer.addEventListener('mousedown',e=>{if(e.target===layer)closeDetail();});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});[query,region,grade].forEach(el=>el.addEventListener('input',renderRows));document.getElementById('clear-filters').addEventListener('click',()=>{query.value='';region.value='全部地区';grade.value='全部等级';renderRows();});
  renderTabs();renderRows();
})();
</script>
<script>
  // The prototype previously contained illustrative records. Keep the UI empty until verified records arrive.
  window.__ACQUIRE_DATA__.customers = [];
  document.getElementById('customer-rows').innerHTML = '';
  document.getElementById('empty-state').classList.remove('static-hidden');
  document.querySelectorAll('.demo-badge').forEach(function (el) { el.textContent = '仅显示已核验数据'; });
  document.querySelectorAll('.result-count').forEach(function (el) { el.textContent = '0 条已核验客户'; });
</script>
</body>
