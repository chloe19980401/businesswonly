<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acquire OS｜全球B2B获客系统</title>
<meta name="description" content="门锁出海工厂全渠道客户情报系统演示版">
<style>


:root {
  --ink: #17202f;
  --muted: #697386;
  --soft: #f5f7fa;
  --line: #e2e7ef;
  --blue: #1768e5;
  --blue-dark: #0f4fae;
  --blue-soft: #eaf2ff;
  --green: #168253;
  --green-soft: #e8f6ef;
  --amber: #a86100;
  --amber-soft: #fff3dc;
  --red: #c23934;
  --red-soft: #fff0ef;
  --white: #ffffff;
  --shadow: 0 18px 50px rgba(22, 35, 59, 0.14);
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #f3f5f8; color: var(--ink); }
body { font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
button, input, select { font: inherit; }
button { cursor: pointer; }

.app-shell { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); }
.sidebar { background: #101a2d; color: #fff; padding: 24px 16px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.brand-block { display: flex; align-items: center; gap: 12px; padding: 0 8px 24px; border-bottom: 1px solid rgba(255,255,255,.1); }
.brand-mark { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(145deg, #3f8cff, #1768e5); display: grid; place-items: center; font-weight: 700; box-shadow: 0 8px 20px rgba(23,104,229,.35); }
.brand-block strong, .brand-block span { display: block; }
.brand-block strong { font-size: 16px; letter-spacing: .2px; }
.brand-block span { color: #9eabc0; font-size: 11px; margin-top: 3px; }
.primary-nav { display: grid; gap: 5px; margin-top: 22px; }
.nav-item { border: 0; background: transparent; color: #aeb9ca; padding: 11px 12px; border-radius: 9px; text-align: left; display: flex; gap: 11px; align-items: center; font-size: 13px; }
.nav-item span { width: 18px; text-align: center; }
.nav-item:hover, .nav-item.active { background: rgba(255,255,255,.1); color: #fff; }
.nav-item.active { box-shadow: inset 3px 0 #4c94ff; }
.sidebar-foot { margin-top: auto; border-top: 1px solid rgba(255,255,255,.1); padding-top: 16px; }
.sync-status { color: #aeb9ca; font-size: 11px; display: flex; gap: 7px; align-items: center; padding: 0 7px 14px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #3cd68b; box-shadow: 0 0 0 4px rgba(60,214,139,.12); }
.user-row { display: flex; align-items: center; gap: 9px; background: rgba(255,255,255,.06); padding: 10px; border-radius: 10px; }
.avatar { width: 30px; height: 30px; background: #34425a; border-radius: 50%; display: grid; place-items: center; font-size: 12px; }
.user-row strong, .user-row small { display: block; }
.user-row strong { font-size: 12px; }
.user-row small { color: #99a6ba; margin-top: 2px; font-size: 10px; }

.workspace { min-width: 0; padding: 28px 30px 42px; }
.topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 22px; }
.eyebrow { color: var(--blue); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
.topbar h1 { margin: 5px 0 4px; font-size: 28px; line-height: 1.2; letter-spacing: -.6px; }
.topbar p { margin: 0; color: var(--muted); font-size: 13px; }
.top-actions, .drawer-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.primary-btn, .secondary-btn, .filter-btn, .close-btn { border-radius: 8px; padding: 9px 13px; border: 1px solid var(--line); background: var(--white); color: var(--ink); font-size: 12px; font-weight: 600; }
.primary-btn { background: var(--blue); color: #fff; border-color: var(--blue); }
.primary-btn:hover { background: var(--blue-dark); }
.secondary-btn:hover, .filter-btn:hover { background: var(--soft); }
.demo-badge { background: var(--amber-soft); color: var(--amber); padding: 6px 9px; border-radius: 999px; font-size: 10px; font-weight: 700; }

.metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin: 22px 0 14px; }
.metrics article { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px; }
.metrics article.metric-link { cursor: pointer; position: relative; transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease; }
.metrics article.metric-link::after { content: '›'; position: absolute; right: 15px; top: 13px; color: #9aa7ba; font-size: 20px; line-height: 1; }
.metrics article.metric-link:hover { transform: translateY(-2px); border-color: #9fc1ff; box-shadow: 0 8px 22px rgba(24, 74, 150, .10); }
.metrics article.metric-link:focus-visible { outline: 3px solid rgba(30, 111, 235, .22); border-color: var(--blue); }
.metrics span, .metrics strong, .metrics small { display: block; }
.metrics span { color: var(--muted); font-size: 11px; }
.metrics strong { font-size: 24px; margin: 7px 0 4px; letter-spacing: -.5px; }
.metrics small { color: var(--muted); font-size: 10px; }
.analytics-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 14px; }
.chart-card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
.chart-card h3 { margin: 0 0 4px; font-size: 15px; }
.chart-card > p { margin: 0 0 18px; color: var(--muted); font-size: 11px; }
.bar-list { display: grid; gap: 13px; }
.bar-row { display: grid; grid-template-columns: 135px minmax(100px,1fr) 34px; gap: 10px; align-items: center; font-size: 11px; }
.bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink); font-weight: 600; }
.bar-track { height: 9px; background: #edf2f8; border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg,#1e6feb,#5a9cff); border-radius: inherit; }
.bar-value { text-align: right; font-weight: 700; }
.insight-list { display: grid; gap: 10px; }
.insight-item { border: 1px solid var(--line); border-radius: 9px; padding: 12px; background: #fbfcfe; }
.insight-item strong, .insight-item span, .insight-item small { display: block; }
.insight-item span { color: var(--blue); font-size: 10px; font-weight: 700; margin-bottom: 5px; }
.insight-item strong { font-size: 12px; }
.insight-item small { color: var(--muted); margin-top: 5px; line-height: 1.5; }

.channel-panel, .content-panel { background: #fff; border: 1px solid var(--line); border-radius: 12px; }
.channel-panel { margin-bottom: 12px; padding: 8px; }
.channel-tabs { display: grid; grid-template-columns: repeat(9, minmax(0,1fr)); gap: 5px; }
.channel-tab { position: relative; min-width: 0; border: 1px solid transparent; background: transparent; border-radius: 9px; padding: 9px 8px; text-align: left; display: grid; grid-template-columns: 27px minmax(0,1fr); gap: 7px; align-items: center; color: var(--ink); }
.channel-tab:hover { background: var(--soft); }
.channel-tab.selected { background: var(--blue-soft); border-color: #c9dcff; color: #114c9e; }
.channel-symbol { width: 27px; height: 27px; border-radius: 8px; background: #eef1f6; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
.channel-tab.selected .channel-symbol { background: var(--blue); color: #fff; }
.channel-tab strong, .channel-tab small { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-tab strong { font-size: 11px; }
.channel-tab small { color: var(--muted); margin-top: 2px; font-size: 9px; }
.channel-tab em { position: absolute; top: 5px; right: 6px; font-style: normal; font-size: 9px; color: var(--muted); }

.filterbar { padding: 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.search-box { min-width: 240px; flex: 1 1 300px; position: relative; }
.search-box span { position: absolute; left: 11px; top: 8px; color: var(--muted); }
.search-box input, .filterbar select { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 9px 10px; color: var(--ink); font-size: 11px; outline: none; }
.search-box input { padding-left: 31px; }
.search-box input:focus, .filterbar select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.filterbar select { width: 118px; }
.country-multi { position: relative; min-width: 150px; }
.country-multi summary { list-style: none; cursor: pointer; border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 9px 34px 9px 11px; color: var(--ink); font-size: 11px; position: relative; user-select: none; }
.country-multi summary::-webkit-details-marker { display: none; }
.country-multi summary::after { content: '⌄'; position: absolute; right: 11px; color: var(--muted); }
.country-multi[open] summary { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.country-options { position: absolute; z-index: 20; top: calc(100% + 6px); left: 0; width: 220px; max-height: 280px; overflow: auto; padding: 8px; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 14px 36px rgba(25,45,78,.16); }
.country-options label { display: flex; align-items: center; gap: 9px; padding: 8px; border-radius: 7px; font-size: 11px; cursor: pointer; }
.country-options label:hover { background: var(--soft); }
.country-options input { accent-color: var(--blue); }
.country-options small { color: var(--muted); margin-left: auto; }
.result-count { margin-left: auto; color: var(--muted); font-size: 10px; }
.result-count strong { color: var(--ink); }

.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1260px; table-layout: fixed; }
th { position: sticky; top: 0; z-index: 1; background: #f8f9fb; color: var(--muted); font-size: 10px; font-weight: 700; padding: 10px 11px; text-align: left; border-bottom: 1px solid var(--line); }
th:nth-child(1) { width: 230px; } th:nth-child(2) { width: 145px; } th:nth-child(3) { width: 240px; } th:nth-child(4) { width: 210px; } th:nth-child(5) { width: 190px; } th:nth-child(6) { width: 78px; } th:nth-child(7) { width: 125px; } th:nth-child(8) { width: 125px; }
td { padding: 12px 11px; border-bottom: 1px solid #edf0f4; vertical-align: top; font-size: 11px; color: #263247; }
tbody tr { transition: background .15s ease; cursor: pointer; }
tbody tr:hover { background: #f7faff; }
td strong, td small { display: block; }
td strong { font-weight: 650; line-height: 1.4; }
td small { color: var(--muted); font-size: 9.5px; line-height: 1.4; margin-top: 4px; }
.account-main { display: flex; gap: 9px; min-width: 0; }
.company-logo { width: 34px; height: 34px; border-radius: 9px; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-size: 10px; font-weight: 800; flex: 0 0 auto; }
.account-main > div { min-width: 0; }
.account-main > div > strong { font-size: 12px; color: #162033; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-line { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tag-line span, .channel-pill, .grade { border-radius: 999px; padding: 3px 6px; font-size: 8.5px; font-weight: 700; display: inline-block; }
.tag-line span { background: #f0f2f6; color: #586579; }
.channel-pill { background: var(--blue-soft); color: #245ca7; margin-bottom: 5px; }
.signal-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.score { width: 39px; height: 39px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 13px; }
.score-strong { color: var(--green); background: var(--green-soft); }
.score-medium { color: var(--amber); background: var(--amber-soft); }
.score-light { color: var(--muted); background: #eef1f5; }
.grade { margin-bottom: 6px; }
.grade-A { color: var(--green); background: var(--green-soft); }
.grade-B { color: var(--amber); background: var(--amber-soft); }
.grade-C { color: var(--muted); background: #eef1f5; }
.empty-state { padding: 60px; display: grid; place-items: center; gap: 8px; color: var(--muted); }
.empty-state strong { color: var(--ink); }

.drawer-layer { position: fixed; inset: 0; background: rgba(12, 19, 31, .48); z-index: 20; display: flex; justify-content: flex-end; }
.detail-drawer { width: min(760px, 94vw); height: 100vh; background: #fff; overflow-y: auto; box-shadow: var(--shadow); animation: slideIn .22s ease-out; }
@keyframes slideIn { from { transform: translateX(30px); opacity: .7; } to { transform: translateX(0); opacity: 1; } }
.drawer-head { padding: 22px 24px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; }
.detail-identity { display: flex; gap: 12px; align-items: flex-start; }
.detail-logo { width: 46px; height: 46px; border-radius: 12px; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-size: 12px; font-weight: 800; }
.detail-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-title-row h2 { margin: 0; font-size: 20px; }
.detail-identity p { margin: 4px 0 6px; color: var(--muted); font-size: 11px; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 6px; }
.detail-meta span { background: var(--soft); color: #536075; border-radius: 6px; padding: 4px 6px; font-size: 9px; }
.close-btn { border: 0; background: #f1f3f6; width: 32px; height: 32px; padding: 0; font-size: 20px; line-height: 1; color: #536075; }
.decision-card { margin: 18px 24px 12px; padding: 15px; border-radius: 11px; background: linear-gradient(110deg, #f0f6ff, #f8fbff); border: 1px solid #d7e6ff; display: grid; grid-template-columns: 76px minmax(0,1fr); gap: 14px; }
.decision-card > div:first-child { border-right: 1px solid #ccdef8; }
.decision-card span, .decision-card small { color: var(--muted); display: block; font-size: 9px; }
.decision-card > div > strong { display: block; color: var(--blue-dark); font-size: 28px; margin-top: 4px; }
.decision-copy strong { display: block; font-size: 12px; line-height: 1.5; margin: 5px 0; color: #1d3559; }
.drawer-actions { padding: 0 24px 18px; border-bottom: 1px solid var(--line); }
.detail-section { padding: 19px 24px; border-bottom: 1px solid var(--line); }
.last-section { padding-bottom: 38px; }
.section-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 13px; }
.section-title h3 { margin: 0; font-size: 14px; }
.section-title span { color: var(--muted); font-size: 9px; }
.info-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 9px 14px; }
.info-item { background: #f8f9fb; border-radius: 8px; padding: 10px 11px; min-width: 0; }
.info-item span, .info-item strong { display: block; }
.info-item span { color: var(--muted); font-size: 9px; margin-bottom: 4px; }
.info-item strong { font-size: 11px; line-height: 1.45; overflow-wrap: anywhere; }
.channel-info { grid-template-columns: repeat(3, minmax(0,1fr)); }
.evidence-box, .compliance-note { margin-top: 10px; border-left: 3px solid var(--blue); background: var(--blue-soft); padding: 10px 12px; }
.evidence-box span { color: #37689e; font-size: 9px; font-weight: 700; }
.evidence-box p { margin: 4px 0 0; font-size: 10px; line-height: 1.5; }
.contact-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: 38px 1fr 1.4fr; gap: 11px; align-items: center; }
.contact-avatar { width: 38px; height: 38px; border-radius: 50%; background: #eaf0f8; color: #21446f; display: grid; place-items: center; font-weight: 800; }
.contact-copy strong, .contact-copy span, .contact-copy small, .contact-detail span { display: block; }
.contact-copy strong { font-size: 12px; }
.contact-copy span { color: #40506a; font-size: 10px; margin-top: 3px; }
.contact-copy small, .contact-detail span { color: var(--muted); font-size: 9px; margin-top: 3px; overflow-wrap: anywhere; }
.next-action { background: var(--green-soft); border-radius: 9px; padding: 12px; }
.next-action span, .next-action strong, .next-action small { display: block; }
.next-action span { color: var(--green); font-size: 9px; font-weight: 700; }
.next-action strong { font-size: 11px; margin: 5px 0; }
.next-action small { color: #527264; font-size: 9px; }
.activity-row { margin-top: 9px; display: flex; justify-content: space-between; gap: 12px; font-size: 10px; }
.activity-row span { color: var(--muted); }
.compliance-note { border-left-color: var(--amber); background: var(--amber-soft); display: flex; gap: 8px; font-size: 10px; }
.compliance-note strong { color: var(--amber); white-space: nowrap; }

@media (max-width: 1280px) {
  .channel-tabs { grid-template-columns: repeat(5, minmax(0,1fr)); }
}
@media (max-width: 900px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; padding: 14px; }
  .brand-block { padding-bottom: 12px; }
  .primary-nav { display: flex; overflow-x: auto; margin-top: 12px; }
  .nav-item { white-space: nowrap; }
  .sidebar-foot { display: none; }
  .workspace { padding: 20px 16px 32px; }
  .metrics { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .channel-tabs { grid-template-columns: repeat(3, minmax(0,1fr)); }
}
@media (max-width: 620px) {
  .topbar { flex-direction: column; }
  .top-actions { width: 100%; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .metrics strong { font-size: 20px; }
  .channel-tabs { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .filterbar select { flex: 1; width: auto; }
  .result-count { width: 100%; margin-left: 0; }
  .detail-drawer { width: 100%; }
  .decision-card { grid-template-columns: 62px minmax(0,1fr); margin-left: 14px; margin-right: 14px; }
  .drawer-head, .detail-section { padding-left: 14px; padding-right: 14px; }
  .drawer-actions { padding-left: 14px; padding-right: 14px; }
  .info-grid, .channel-info { grid-template-columns: 1fr; }
  .contact-card { grid-template-columns: 38px 1fr; }
  .contact-detail { grid-column: 1 / -1; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

.static-hidden{display:none!important}.static-channel-tabs{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:5px}.detail-drawer{padding-bottom:20px}
@media(max-width:1280px){.static-channel-tabs{grid-template-columns:repeat(5,minmax(0,1fr))}}@media(max-width:900px){.static-channel-tabs{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:620px){.static-channel-tabs{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<main class="app-shell">
  <aside class="sidebar">
    <div class="brand-block"><div class="brand-mark">A</div><div><strong>Acquire OS</strong><span>全球客户情报系统</span></div></div>
    <nav class="primary-nav" aria-label="主导航">
      <button class="nav-item active"><span>⌂</span>获客中心</button><button class="nav-item"><span>◎</span>账户雷达</button><button class="nav-item"><span>◇</span>联系人</button><button class="nav-item"><span>✓</span>任务与商机</button><button class="nav-item"><span>▦</span>数据源中心</button><button class="nav-item"><span>◫</span>分析中心</button>
    </nav>
    <div class="sidebar-foot"><div class="sync-status"><span class="status-dot"></span>8个渠道正常同步</div><div class="user-row"><span class="avatar">陈</span><div><strong>陈睿</strong><small>北美品牌客户组</small></div></div></div>
  </aside>
  <section class="workspace">
    <header class="topbar"><div><div class="eyebrow">获客中心 / 全渠道客户池</div><h1>全球目标客户</h1><p>从采购证据、决策人、项目与主动意向中识别最值得跟进的账户。</p></div><div class="top-actions"><span class="demo-badge">演示数据</span><button class="secondary-btn">导入数据</button><button class="primary-btn">＋ 新建名单</button></div></header>
    <section class="metrics" aria-label="客户池概览"><article class="metric-link" role="button" tabindex="0" data-metric-target="accounts" aria-label="查看19个已核验账户"><span>已核验账户</span><strong>0</strong><small>查看全部目标客户</small></article><article class="metric-link" role="button" tabindex="0" data-metric-target="contacts" aria-label="查看6个已核验联系人"><span>已核验联系人</span><strong>6</strong><small>查看官方公开商务联系方式</small></article><article class="metric-link" role="button" tabindex="0" data-metric-target="signals" aria-label="查看今日新信号"><span>今日新信号</span><strong>0</strong><small>进入数据源中心</small></article><article class="metric-link" role="button" tabindex="0" data-metric-target="handoff" aria-label="查看待销售接手的任务"><span>待销售接手</span><strong>0</strong><small>进入任务与商机</small></article></section>

      '<section class="content-panel"><div class="filterbar"><label class="search-box"><span>⌕</span><input id="task-query" aria-label="搜索任务" placeholder="搜索企业、国家、任务或邮箱"></label>'+countryFilter('task-country')+'<div class="result-count" id="task-result-count">正在读取任务…</div></div><div class="table-wrap"><table><thead><tr><th>任务</th><th>目标机构</th><th>类型 / 优先级</th><th>下一步</th><th>公开联系入口</th><th>证据</th><th>状态</th></tr></thead><tbody id="task-rows"></tbody></table><div class="empty-state static-hidden" id="task-empty"><strong>没有匹配的任务</strong><span>请调整搜索词。</span></div></div></section>';
    fetch('./crawler/action-tasks.json',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject()).then(data=>{
      const all=Array.isArray(data.tasks)?data.tasks:[]; const rows=document.getElementById('task-rows'); const count=document.getElementById('task-result-count'); const empty=document.getElementById('task-empty');
      const draw=list=>{ rows.innerHTML=list.map(t=>'<tr><td><strong>'+escContact(t.title)+'</strong><small>系统建议任务</small></td><td><div class="account-main"><span class="company-logo">'+escContact(t.country)+'</span><div><strong>'+escContact(t.organization)+'</strong><small>'+escContact(t.country)+'</small></div></div></td><td><span class="channel-pill">'+escContact(t.type)+'</span><strong>'+escContact(t.priority)+'</strong></td><td><strong>'+escContact(t.nextStep)+'</strong></td><td>'+(String(t.contact).includes('@')?'<a href="mailto:'+escContact(t.contact)+'"><strong>'+escContact(t.contact)+'</strong></a>':'<strong>'+escContact(t.contact)+'</strong>')+'<small><a href="'+escContact(t.sourceUrl)+'" target="_blank" rel="noopener noreferrer">打开官方入口 ↗</a></small></td><td><strong>'+escContact(t.evidence)+'</strong><small>公开来源核验</small></td><td><span class="grade grade-A">'+escContact(t.status)+'</span></td></tr>').join(''); count.textContent=list.length+' 个建议任务'; empty.classList.toggle('static-hidden',list.length>0); };
      let getCountries=()=>new Set(); const applyFilters=()=>{const q=document.getElementById('task-query').value.trim().toLowerCase();const countries=getCountries();draw(all.filter(t=>(!countries.size||countries.has(t.country))&&(!q||Object.values(t).join(' ').toLowerCase().includes(q))));}; getCountries=bindCountryFilter('task-country',applyFilters); applyFilters(); document.getElementById('task-count').textContent=all.length; document.getElementById('task-query').addEventListener('input',applyFilters);
    }).catch(()=>{document.getElementById('task-result-count').textContent='任务数据读取失败';});
  };
  const renderAnalytics = () => {
    workspace.innerHTML = '<header class="topbar"><div><div class="eyebrow">Acquire OS / 分析中心</div><h1>分析中心</h1><p>基于当前已核验采购目标与联系人实时计算，不展示虚拟指标。</p></div><div class="top-actions"><span class="demo-badge">数据日期 2026-07-13</span></div></header>'+
      '<section class="metrics"><article><span>已核验目标</span><strong id="ana-targets">19</strong><small>官方采购或供应商入口</small></article><article><span>已核验联系人</span><strong id="ana-contacts">6</strong><small>公开商务联系方式</small></article><article><span>覆盖国家</span><strong id="ana-countries">7</strong><small>中东与中亚</small></article><article><span>自动采集覆盖</span><strong id="ana-rate">95%</strong><small>18 / 19 个目标</small></article></section>'+
      '<section class="analytics-grid"><article class="chart-card"><h3>目标国家分布</h3><p>按当前官方采购目标数量排序</p><div class="bar-list" id="country-bars"></div></article><article class="chart-card"><h3>渠道结构</h3><p>按目标机构类型汇总</p><div class="bar-list" id="type-bars"></div></article><article class="chart-card"><h3>重点市场判断</h3><p>由当前目标池直接计算</p><div class="insight-list" id="market-insights"></div></article><article class="chart-card"><h3>数据质量</h3><p>核验和采集状态</p><div class="insight-list" id="quality-insights"></div></article></section>';
    Promise.all([fetch('./crawler/phase-1-buyers.json',{cache:'no-store'}).then(r=>r.json()),fetch('./crawler/verified-contacts.json',{cache:'no-store'}).then(r=>r.json())]).then(([buyers,contacts])=>{
      const targets=Array.isArray(buyers.targets)?buyers.targets:[]; const people=Array.isArray(contacts.contacts)?contacts.contacts:[];
      const countries={}; const groups={'政府采购 / 招标':0,'地产 / 大型项目':0,'机构采购':0};
      targets.forEach(t=>{countries[t.country]=(countries[t.country]||0)+1; if(String(t.type).includes('developer')) groups['地产 / 大型项目']++; else if(String(t.type).includes('institutional')||String(t.type).includes('public_works')) groups['机构采购']++; else groups['政府采购 / 招标']++;});
      const sortedCountries=Object.entries(countries).sort((a,b)=>b[1]-a[1]); const sortedGroups=Object.entries(groups).sort((a,b)=>b[1]-a[1]); const maxCountry=Math.max(1,...sortedCountries.map(x=>x[1])); const maxGroup=Math.max(1,...sortedGroups.map(x=>x[1])); const auto=targets.filter(t=>t.crawlMode==='public').length;
      const bars=(list,max)=>list.map(([label,value])=>'<div class="bar-row"><span class="bar-label">'+escContact(label)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+(value/max*100).toFixed(0)+'%"></div></div><span class="bar-value">'+value+'</span></div>').join('');
      document.getElementById('country-bars').innerHTML=bars(sortedCountries,maxCountry); document.getElementById('type-bars').innerHTML=bars(sortedGroups,maxGroup);
      document.getElementById('ana-targets').textContent=targets.length; document.getElementById('ana-contacts').textContent=people.length; document.getElementById('ana-countries').textContent=sortedCountries.length; document.getElementById('ana-rate').textContent=(targets.length?Math.round(auto/targets.length*100):0)+'%';
      const top=sortedCountries.slice(0,3); document.getElementById('market-insights').innerHTML=top.map(([country,n],i)=>'<div class="insight-item"><span>优先级 '+(i+1)+'</span><strong>'+escContact(country)+' · '+n+' 个已核验目标</strong><small>数量来自当前官方采购目标池，不代表已确认采购意向。</small></div>').join('');
      document.getElementById('quality-insights').innerHTML='<div class="insight-item"><span>官方来源</span><strong>'+targets.length+' / '+targets.length+' 个目标保留来源 URL</strong><small>可逐条回到采购、供应商注册或机构官网核验。</small></div><div class="insight-item"><span>自动采集</span><strong>'+auto+' 个公开采集 · '+(targets.length-auto)+' 个人工核验</strong><small>受条款限制的来源不会绕过登录、验证码或访问限制。</small></div><div class="insight-item"><span>联系人质量</span><strong>'+people.length+' 条官方公开商务联系方式</strong><small>具名负责人和部门联系人分开标注。</small></div>';
    }).catch(()=>{document.getElementById('country-bars').innerHTML='<div class="empty-state"><strong>分析数据读取失败</strong><span>请刷新后重试。</span></div>';});
  };
  const render = (i) => {
    if (i === 0) { location.reload(); return; }
    if (i === 2) { renderContacts(); return; }
    if (i === 3) { renderTasks(); return; }
    if (i === 4) { renderSources(); return; }
    if (i === 5) { renderAnalytics(); return; }
    const p = pages[i-1];
    workspace.innerHTML = '<header class="topbar"><div><div class="eyebrow">Acquire OS / '+p[0]+'</div><h1>'+p[0]+'</h1><p>'+p[1]+'</p></div><div class="top-actions"><span class="demo-badge">仅显示已核验数据</span><button class="primary-btn">＋ 新建</button></div></header><section class="metrics"><article><span>'+p[2]+'</span><strong>'+p[3]+'</strong><small>'+p[4]+'</small></article><article><span>数据可信度</span><strong>公开来源</strong><small>每条记录保留来源 URL 和抓取时间</small></article><article><span>地区范围</span><strong>中东 / 中亚</strong><small>可扩展到更多目标市场</small></article><article><span>合规状态</span><strong>正常</strong><small>不绕过登录、验证码或访问限制</small></article></section><section class="content-panel"><div class="empty-state"><strong>'+p[4]+'</strong><span>系统不会展示虚拟客户或未经核验的联系人。运行采集器后，结果将从公开来源进入这里。</span><button class="secondary-btn" style="margin-top:18px">查看采集记录</button></div></section>';
  };
  nav.forEach((item, i) => item.addEventListener('click', () => { nav.forEach(x => x.classList.remove('active')); item.classList.add('active'); render(i); }));
  const openMetric = target => {
    if (target === 'accounts') {
      document.querySelector('.content-panel')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('query')?.focus();
      return;
    }
    if (target === 'contacts') nav[2]?.click();
    if (target === 'signals') nav[4]?.click();
    if (target === 'handoff') nav[3]?.click();
  };
  document.querySelectorAll('[data-metric-target]').forEach(card => {
    card.addEventListener('click', () => openMetric(card.dataset.metricTarget));
    card.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openMetric(card.dataset.metricTarget);
      }
    });
  });
})();
</script>
<script>
(() => {
  const escHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  fetch('./crawler/phase-1-buyers.json', { cache: 'no-store' })
    .then(response => response.ok ? response.json() : Promise.reject(new Error('target_pool_unavailable')))
    .then(data => {
      const targets = Array.isArray(data.targets) ? data.targets : [];
      const verified = targets.filter(item => item.status && item.status.startsWith('official_'));
      const publicTargets = verified.filter(item => item.crawlMode === 'public');
      const manualTargets = verified.filter(item => item.crawlMode === 'manual_only');
      const rows = document.getElementById('customer-rows');
      const empty = document.getElementById('empty-state');
      const result = document.getElementById('result-count');
      if (!rows) return;
      const countryInputs = [...document.querySelectorAll('#country-multi input[type="checkbox"]')];
      const queryInput = document.getElementById('query');
      const draw = () => {
      const selected = new Set(countryInputs.filter(input => input.checked).map(input => input.value));
      const q = (queryInput?.value || '').trim().toLowerCase();
      const list = verified.filter(item => (!selected.size || selected.has(item.country)) && (!q || [item.name,item.country,item.type,item.status].join(' ').toLowerCase().includes(q)));
      const summary = document.getElementById('country-summary');
      if (summary) summary.textContent = selected.size ? '已选 '+selected.size+' 个国家' : '全部国家';
      rows.innerHTML = list.map(item => '<tr data-target-url="'+escHtml(item.officialUrl)+'" tabindex="0" style="cursor:pointer">'+
        '<td><div class="account-main"><span class="company-logo">'+escHtml(item.country)+'</span><div><a href="'+escHtml(item.officialUrl)+'" target="_blank" rel="noopener noreferrer"><strong>'+escHtml(item.name)+'</strong></a><small>官方采购入口</small><div class="tag-line"><span>'+escHtml(item.priority)+'</span></div></div></div></td>'+
        '<td><strong>'+escHtml(item.type)+'</strong><small>'+escHtml(item.country)+'</small></td>'+
        '<td><span class="channel-pill">官网 / 采购入口</span><strong class="signal-text">'+(item.crawlMode === 'public' ? '已进入公开自动采集' : '网站条款要求人工核验')+'</strong><small>'+escHtml(item.status)+'</small></td>'+
        '<td><strong>待发现公开采购项目</strong><small>持续监测官方公告与供应商页面</small></td>'+
        '<td><strong>待官方来源核验</strong><small>不猜测联系人或邮箱</small></td>'+
        '<td><div class="score score-strong">'+(item.priority === 'S1' ? '90' : '80')+'</div><small>官方来源</small></td>'+
        '<td><span class="grade grade-A">A</span><strong>目标池</strong><small>'+escHtml(item.crawlMode)+'</small></td>'+
        '<td><a href="'+escHtml(item.officialUrl)+'" target="_blank" rel="noopener noreferrer">查看来源</a><small>'+escHtml(data.generatedAt || '')+'</small></td>'+
      '</tr>').join('');
      rows.querySelectorAll('[data-target-url]').forEach(row => {
        const open = () => window.open(row.dataset.targetUrl, '_blank', 'noopener,noreferrer');
        row.addEventListener('click', event => { if (!event.target.closest('a')) open(); });
        row.addEventListener('keydown', event => { if (event.key === 'Enter' || event.key === ' ') open(); });
      });
      empty?.classList.toggle('static-hidden', list.length > 0);
      if (result) result.innerHTML = '<strong>'+list.length+'</strong> / '+verified.length+' 个已核验采购目标'+(selected.size?' · 已选 '+selected.size+' 个国家':'');
      };
      countryInputs.forEach(input => input.addEventListener('change', draw));
      queryInput?.addEventListener('input', draw);
      document.getElementById('clear-filters')?.addEventListener('click', () => { countryInputs.forEach(input => { input.checked = false; }); if (queryInput) queryInput.value = ''; draw(); });
      draw();
      const metricValues = document.querySelectorAll('.metrics article strong');
      if (metricValues[0]) metricValues[0].textContent = String(verified.length);
      if (metricValues[1]) metricValues[1].textContent = '6';
      if (metricValues[2]) metricValues[2].textContent = String(publicTargets.length);
      if (metricValues[3]) metricValues[3].textContent = String(manualTargets.length);
    })
    .catch(() => {});
})();
</script>
